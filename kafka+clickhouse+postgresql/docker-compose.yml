services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo srvr | nc localhost 2181 | grep -q Mode"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-1:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 2
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 15

  kafka-2:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 2
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 15

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 10s
      timeout: 5s
      retries: 15

  kafka-init:
    build:
      context: ./init
    depends_on:
      schema-registry:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      TOPIC_NAME: movie-events
      SCHEMA_FILE: /schemas/movie_event.avsc
      TOPIC_PARTITIONS: "3"
      TOPIC_REPLICATION_FACTOR: "2"
      TOPIC_MIN_ISR: "1"
    volumes:
      - ./schemas:/schemas:ro
    restart: on-failure

  producer:
    build:
      context: ./producer
    depends_on:
      schema-registry:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      TOPIC_NAME: movie-events
      SCHEMA_FILE: /schemas/movie_event.avsc
      GENERATOR_INTERVAL_SEC: "0.5"
      GENERATOR_USERS: "10"
    volumes:
      - ./schemas:/schemas:ro
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: on-failure

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"
      - "9000:9000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 15
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  clickhouse-init:
    build:
      context: ./clickhouse
    depends_on:
      clickhouse:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      CLICKHOUSE_URL: http://clickhouse:8123
      MIGRATIONS_DIR: /migrations
    volumes:
      - ./clickhouse/migrations:/migrations:ro
    restart: on-failure

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: metrics
      POSTGRES_USER: metrics
      POSTGRES_PASSWORD: metrics
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metrics -d metrics"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-04-18T19-09-19Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 15
    restart: on-failure

  minio-init:
    image: minio/mc:RELEASE.2024-04-18T16-45-29Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/movie-analytics &&
        mc anonymous set none local/movie-analytics &&
        echo 'MinIO bucket movie-analytics ready'
      "
    restart: on-failure

  aggregation:
    build:
      context: ./aggregation
    depends_on:
      clickhouse-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      CLICKHOUSE_URL: http://clickhouse:8123
      POSTGRES_DSN: "host=postgres port=5432 dbname=metrics user=metrics password=metrics"
      SCHEDULE_INTERVAL_SEC: "60"
      TOP_MOVIES_LIMIT: "10"
      PG_MIGRATIONS_DIR: /pg_migrations
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: movie-analytics
      S3_EXPORT_SCHEDULE_SEC: "3600"
    volumes:
      - ./aggregation/migrations:/pg_migrations:ro
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: on-failure

  grafana:
    image: grafana/grafana:10.4.2
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 15
    restart: on-failure

  tests:
    build:
      context: ./tests
    depends_on:
      producer:
        condition: service_started
      clickhouse-init:
        condition: service_completed_successfully
    profiles:
      - test

volumes:
  grafana_data:
  minio_data:
