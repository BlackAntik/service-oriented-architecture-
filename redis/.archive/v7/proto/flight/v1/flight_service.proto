syntax = "proto3";

package flight.v1;

import "google/protobuf/timestamp.proto";

service FlightService {
  rpc SearchFlights(SearchFlightsRequest) returns (SearchFlightsResponse);
  rpc GetFlight(GetFlightRequest) returns (GetFlightResponse);
  rpc ReserveSeats(ReserveSeatsRequest) returns (ReserveSeatsResponse);
  rpc ReleaseReservation(ReleaseReservationRequest) returns (ReleaseReservationResponse);
}

enum FlightStatus {
  FLIGHT_STATUS_UNSPECIFIED = 0;
  FLIGHT_STATUS_SCHEDULED = 1;
  FLIGHT_STATUS_DELAYED = 2;
  FLIGHT_STATUS_CANCELLED = 3;
  FLIGHT_STATUS_DEPARTED = 4;
  FLIGHT_STATUS_COMPLETED = 5;
}

enum ReservationStatus {
  RESERVATION_STATUS_UNSPECIFIED = 0;
  RESERVATION_STATUS_ACTIVE = 1;
  RESERVATION_STATUS_RELEASED = 2;
  RESERVATION_STATUS_EXPIRED = 3;
}

enum GrpcErrorCode {
  GRPC_ERROR_CODE_UNSPECIFIED = 0;
  INVALID_ARGUMENT = 3;
  NOT_FOUND = 5;
  ALREADY_EXISTS = 6;
  FAILED_PRECONDITION = 9;
  RESOURCE_EXHAUSTED = 8;
  UNAUTHENTICATED = 16;
  PERMISSION_DENIED = 7;
  INTERNAL = 13;
}

message Error {
  GrpcErrorCode code = 1;
  string message = 2;
}

message Route {
  string origin = 1;
  string destination = 2;
}

message Flight {
  string id = 1;
  string flight_number = 2;

  string airline_iata_code = 3;
  string airline_name = 4;

  Route route = 5;
  google.protobuf.Timestamp departure_time = 6;
  google.protobuf.Timestamp arrival_time = 7;

  int32 total_seats = 8;
  int32 available_seats = 9;

  int64 price_cents = 10;
  string currency = 11;

  FlightStatus status = 12;
}

message Reservation {
  string id = 1;
  string flight_id = 2;
  string booking_id = 3;
  int32 seats = 4;
  ReservationStatus status = 5;
  google.protobuf.Timestamp reserved_at = 6;
  google.protobuf.Timestamp expires_at = 7;
}

message SearchFlightsRequest {
  string origin = 1;
  string destination = 2;
  google.protobuf.Timestamp departure_time_from = 3;
  google.protobuf.Timestamp departure_time_to = 4;
  int32 seats_required = 5;
}

message SearchFlightsResponse {
  repeated Flight flights = 1;
}

message GetFlightRequest {
  string flight_id = 1;
}

message GetFlightResponse {
  Flight flight = 1;
}

message ReserveSeatsRequest {
  string flight_id = 1;
  string booking_id = 2;
  int32 seats = 3;
}

message ReserveSeatsResponse {
  Reservation reservation = 1;
}

message ReleaseReservationRequest {
  string booking_id = 1;
}

message ReleaseReservationResponse {}