services:
  flight-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flightdb
      POSTGRES_USER: flight
      POSTGRES_PASSWORD: flight
    ports:
      - "5434:5432"
    volumes:
      - flight_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flight -d flightdb"]
      interval: 3s
      timeout: 3s
      retries: 30

  booking-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bookingdb
      POSTGRES_USER: booking
      POSTGRES_PASSWORD: booking
    ports:
      - "5433:5432"
    volumes:
      - booking_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booking -d bookingdb"]
      interval: 3s
      timeout: 3s
      retries: 30

  redis-master:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 30

  redis-slave:
    image: redis:7-alpine
    command: redis-server --slaveof redis-master 6379
    ports:
      - "6380:6379"
    depends_on:
      - redis-master
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 30

  redis-sentinel:
    image: redis:7-alpine
    command: redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./sentinel/sentinel.conf:/etc/redis/sentinel.conf
    ports:
      - "26379:26379"
    depends_on:
      - redis-master
      - redis-slave
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 3s
      timeout: 3s
      retries: 30

  flight-service:
    build:
      context: .
      dockerfile: flight_service/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://flight:flight@flight-db:5432/flightdb
      REDIS_SENTINEL_HOST: redis-sentinel
      REDIS_SENTINEL_PORT: "26379"
      REDIS_MASTER_SET: mymaster
      GRPC_HOST: 0.0.0.0
      GRPC_PORT: "50051"
      FLIGHT_SERVICE_API_KEY: "secret-api-key-123"
    depends_on:
      flight-db:
        condition: service_healthy
      redis-sentinel:
        condition: service_healthy
    ports:
      - "50051:50051"

  booking-service:
    build:
      context: .
      dockerfile: booking_service/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://booking:booking@booking-db:5432/bookingdb
      FLIGHT_GRPC_ADDR: flight-service:50051
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: "8000"
      FLIGHT_SERVICE_API_KEY: "secret-api-key-123"
    depends_on:
      booking-db:
        condition: service_healthy
      flight-service:
        condition: service_started
    ports:
      - "8000:8000"

volumes:
  flight_db_data:
  booking_db_data: